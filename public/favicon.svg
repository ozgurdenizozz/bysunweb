<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>

  <!-- Sun rays -->
  <g stroke="#FCA311" stroke-width="14" stroke-linecap="round" fill="none">
    <!-- Top -->
    <line x1="100" y1="10" x2="100" y2="40"/>
    <!-- Top right -->
    <line x1="158" y1="28" x2="142" y2="48"/>
    <!-- Right -->
    <line x1="190" y1="100" x2="160" y2="100"/>
    <!-- Bottom right -->
    <line x1="158" y1="172" x2="142" y2="152"/>
    <!-- Bottom -->
    <line x1="100" y1="190" x2="100" y2="160"/>
    <!-- Bottom left -->
    <line x1="42" y1="172" x2="58" y2="152"/>
    <!-- Left -->
    <line x1="10" y1="100" x2="40" y2="100"/>
    <!-- Top left -->
    <line x1="42" y1="28" x2="58" y2="48"/>
  </g>

  <!-- Sun circle -->
  <circle cx="100" cy="100" r="50" fill="#FCA311"/>
</svg>